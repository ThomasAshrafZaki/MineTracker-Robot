logLevel: info
logDestinations: [stdout]

rtspAddress: :8554

hls: true
hlsAddress: :8888

webrtc: true
webrtcAddress: :8889
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302

api: true
apiAddress: :9997

paths:
  cam:
    runOnDemand: >-
      gst-launch-1.0
      v4l2src device=/dev/video0 do-timestamp=true
      ! video/x-raw,width=640,height=480,framerate=30/1,format=YUY2
      ! nvvidconv
      ! video/x-raw(memory:NVMM),format=I420
      ! nvv4l2h264enc bitrate=2000000 iframeinterval=60 preset-level=1 control-rate=1
      ! h264parse
      ! rtspclientsink location=rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH protocols=tcp
    runOnDemandRestart: yes